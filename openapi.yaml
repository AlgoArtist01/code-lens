openapi: 3.0.3
info:
  title: CodeLens API
  description: AI-powered code review platform API
  version: 1.0.0

servers:
  - url: http://localhost:4000/api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        "201": { description: User created, returns token + user }
        "409": { description: Email already registered }

  /login:
    post:
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200": { description: Returns token + user }
        "401": { description: Invalid credentials }

  /repos:
    get:
      summary: List repositories for the authenticated user
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Array of repositories }

  /repo/upload:
    post:
      summary: Upload a repository as a ZIP file
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                name: { type: string }
      responses:
        "201": { description: Repository created }

  /repo/git:
    post:
      summary: Clone a repository from a Git URL
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string }
                name: { type: string }
      responses:
        "201": { description: Repository cloned }

  /repo/{id}:
    delete:
      summary: Delete a repository
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: Deleted }

  /repo/{id}/parse:
    post:
      summary: Parse repository into files/directories/symbols
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Parse summary }

  /repo/{id}/tree:
    get:
      summary: Get the parsed file tree
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: File list with language/size/line count }

  /repo/{id}/analyze/{kind}:
    post:
      summary: Run static analysis (general, python, or js)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: kind, in: path, required: true, schema: { type: string, enum: [general, python, js] } }
      responses:
        "200": { description: Issues found, counted by severity/source }

  /repo/{id}/issues:
    get:
      summary: List all issues for a repository
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Issues sorted by severity }

  /repo/{id}/ai-review/file/stream:
    post:
      summary: Stream an AI review of a single file (Server-Sent Events)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [filePath]
              properties:
                filePath: { type: string }
      responses:
        "200": { description: SSE stream of tokens, then a final findings event }

  /repo/{id}/review:
    post:
      summary: Queue a full background review (parse → analyze → AI review)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "202": { description: Job queued, returns jobId }

  /repo/{id}/review/{jobId}:
    get:
      summary: Get background job status/progress
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: jobId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Job status, progress, current stage }

  /repo/{id}/review/{jobId}/cancel:
    post:
      summary: Cancel a queued or running background job
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: jobId, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Job cancelled }

  /repo/{id}/docs/{docType}:
    post:
      summary: Generate documentation (readme, architecture, or api)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: docType, in: path, required: true, schema: { type: string, enum: [readme, architecture, api] } }
      responses:
        "200": { description: Generated markdown content }

  /repo/{id}/rag/index:
    post:
      summary: Chunk and embed a repository for chat retrieval
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Indexing summary (files, chunks) }

  /repo/{id}/rag/chat:
    post:
      summary: Ask a question about the repository (RAG-grounded answer)
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question: { type: string }
      responses:
        "200": { description: Answer with cited source chunks }

  /account:
    delete:
      summary: Delete the authenticated user's account and all associated data
      security: [{ bearerAuth: [] }]
      responses:
        "204": { description: Account deleted }